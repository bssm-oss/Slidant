name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push playwright
        run: |
          docker build -t ghcr.io/bssm-oss/slidant-playwright:latest ./playwright
          docker push ghcr.io/bssm-oss/slidant-playwright:latest

      - name: Build & push api
        run: |
          docker build -t ghcr.io/bssm-oss/slidant-api:latest ./api
          docker push ghcr.io/bssm-oss/slidant-api:latest

      - name: Build & push ui
        run: |
          docker build -t ghcr.io/bssm-oss/slidant-ui:latest ./ui
          docker push ghcr.io/bssm-oss/slidant-ui:latest

  deploy:
    name: Deploy to Proxmox LXC
    runs-on: self-hosted
    needs: build
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Create env files
        run: |
          cat > api/.env <<EOF
          DATABASE_URL=postgresql+asyncpg://slidant:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/slidant
          REDIS_URL=redis://localhost:6379
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }}
          EOF

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull & deploy
        run: |
          docker image prune -f
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timeout: API never became healthy"
              docker compose logs api --tail 50
              exit 1
            fi
            sleep 3
          done

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back"
          docker compose up -d --remove-orphans
