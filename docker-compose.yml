services:
  db:
    image: postgres:16-alpine
    container_name: slidant-postgres
    environment:
      POSTGRES_DB: slidant
      POSTGRES_USER: slidant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slidant}
    network_mode: host
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: slidant-redis
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/bssm-oss/slidant-api:latest
    build: ./api
    container_name: slidant-api
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://slidant:${POSTGRES_PASSWORD:-slidant}@localhost:5432/slidant
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FERNET_KEY: ${FERNET_KEY:-nXW4KWszBYNONjbVjcQ76Phn27XWsbVdxfxjoRyhNqY=}
      MOCK_AGENT: ${MOCK_AGENT:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      APP_ENV: production
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:3002,http://localhost:5173,${EXTRA_CORS_ORIGINS:-}
      PLAYWRIGHT_SERVICE_URL: http://localhost:3001
      VISUAL_VALIDATION_ENABLED: "true"
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      playwright:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  playwright:
    image: ghcr.io/bssm-oss/slidant-playwright:latest
    build: ./playwright
    container_name: slidant-playwright
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ui:
    image: ghcr.io/bssm-oss/slidant-ui:latest
    build:
      context: ./ui
      args:
        VITE_API_URL: /api/v1
    container_name: slidant-ui
    network_mode: host
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
