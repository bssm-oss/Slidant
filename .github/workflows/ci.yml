name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-ui:
    name: UI Type Check & Lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings 0 || true

  lint-api:
    name: API Lint & Type Check
    runs-on: self-hosted
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: pip install ruff && ruff check . || true

      - name: Type check
        run: pip install pyright && pyright . || true

  build:
    name: Build Docker Images
    runs-on: self-hosted
    needs: [lint-ui, lint-api]
    steps:
      - uses: actions/checkout@v4

      - name: Build images (no push)
        run: docker compose build
