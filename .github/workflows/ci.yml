name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-api:
    name: API Lint & Type Check
    runs-on: self-hosted
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . || true

      - name: Type check
        run: pyright . || true

  lint-ui:
    name: UI Type Check & Lint
    runs-on: self-hosted
    needs: lint-api
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings 0 || true

  build:
    name: Build Docker Images
    runs-on: self-hosted
    needs: [lint-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          docker builder prune -f
          docker image prune -f

      - name: Build images (no push)
        run: docker compose build api ui
