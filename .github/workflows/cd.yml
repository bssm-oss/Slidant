name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# main 동시 배포 방지 — 이전 배포가 끝날 때까지 대기
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Proxmox LXC
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Create env files
        run: |
          # api/.env 생성 (GitHub Secrets → 파일)
          cat > api/.env <<EOF
          DATABASE_URL=postgresql+asyncpg://slidant:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/slidant
          REDIS_URL=redis://localhost:6379
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }}
          EOF

      - name: Free disk space
        run: |
          docker builder prune -f
          docker image prune -f

      - name: Pull & rebuild
        run: |
          docker compose pull --ignore-pull-failures || true
          docker compose build playwright
          docker compose build --no-cache api
          docker compose build --no-cache ui
          docker compose up -d --remove-orphans

      - name: Wait for healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timeout: API never became healthy"
              docker compose logs api --tail 50
              exit 1
            fi
            sleep 3
          done

      - name: Clean old images
        run: docker image prune -f

      - name: Notify success
        if: success()
        run: |
          echo "Deployed commit ${{ github.sha }} at $(date)"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back"
          git stash
          docker compose up -d --remove-orphans
          echo "Rollback done"
