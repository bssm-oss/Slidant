services:
  db:
    image: postgres:16-alpine
    container_name: slidant-postgres
    environment:
      POSTGRES_DB: slidant
      POSTGRES_USER: slidant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slidant}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: slidant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    container_name: slidant-api
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://slidant:${POSTGRES_PASSWORD:-slidant}@db:5432/slidant
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FERNET_KEY: ${FERNET_KEY:-nXW4KWszBYNONjbVjcQ76Phn27XWsbVdxfxjoRyhNqY=}
      MOCK_AGENT: ${MOCK_AGENT:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # LANGSMITH_* 및 LANGCHAIN_* 는 env_file(./api/.env)에서 자동 주입
      APP_ENV: production
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:3002,http://localhost:5173,${EXTRA_CORS_ORIGINS:-}
      PLAYWRIGHT_SERVICE_URL: http://playwright:3001
      VISUAL_VALIDATION_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      playwright:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  playwright:
    build: ./playwright
    container_name: slidant-playwright
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: /api/v1
    container_name: slidant-ui
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
